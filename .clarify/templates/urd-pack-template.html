<!doctype html>
<!--
  HTML shell for the full URD — generated by /clarify:export (or finalize step 9c). DERIVED
  rendering; the source of truth is clarify-output/urd.md. The agent fills the body from urd.md
  (pandoc md->html --toc, or a minimal fallback). DIAGRAMS ARE MERMAID-ONLY and render
  client-side (no data leaves the machine); there is NO PlantUML branch. Requirement/user-story
  group-band rows become colspan merged cells where present. NO tool label ("Clarify", "Review
  Pack") appears in the displayed content. For urd.offline.html: replace the CDN <script> with an
  inlined mermaid.min.js.
-->
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title><!-- CLARIFY:TITLE -->Tài liệu Đặc tả Yêu cầu Người dùng (URD)</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>mermaid.initialize({ startOnLoad: true, theme: "neutral", securityLevel: "loose" });</script>
<style>
  :root{--ink:#1b2733;--muted:#5c6b7a;--line:#e1e7ee;--brand:#0b6e99;--brand-dark:#084a66;--accent:#eaf4f9}
  *{box-sizing:border-box}
  body{margin:0;background:#eef2f6;color:var(--ink);font-family:"Segoe UI",system-ui,Arial,sans-serif;line-height:1.6;font-size:15px}
  .page{max-width:960px;margin:24px auto;background:#fff;padding:48px 56px;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
  h1{font-size:25px;color:var(--brand-dark);border-bottom:3px solid var(--brand);padding-bottom:10px;margin:0 0 6px}
  h2{font-size:20px;color:var(--brand-dark);margin:30px 0 8px;border-bottom:1px solid var(--line);padding-bottom:5px}
  h3{font-size:16.5px;color:var(--brand-dark);margin:22px 0 6px;border-left:4px solid var(--brand);padding-left:10px}
  h4{font-size:14.5px;color:var(--brand-dark);margin:16px 0 4px}
  p{margin:9px 0}
  a{color:var(--brand);text-decoration:none}a:hover{text-decoration:underline}
  ul,ol{margin:8px 0;padding-left:24px}li{margin:3px 0}
  hr{border:none;border-top:1px solid var(--line);margin:22px 0}
  blockquote{border-left:4px solid var(--accent);background:#f7fbfd;margin:10px 0;padding:8px 14px;color:var(--muted)}
  code{background:#eef2f6;border:1px solid var(--line);border-radius:4px;padding:1px 5px;font-family:Consolas,monospace;font-size:12.5px;color:var(--brand-dark)}
  pre.code{background:#0f1620;color:#d7e2ec;border-radius:8px;padding:14px 16px;overflow:auto}
  pre.code code{background:none;border:none;color:inherit;padding:0}
  table{border-collapse:collapse;width:100%;margin:12px 0;font-size:13.5px}
  th,td{border:1px solid var(--line);padding:7px 10px;text-align:left;vertical-align:top}
  th{background:var(--accent);color:var(--brand-dark);font-weight:600}
  tr:nth-child(even) td{background:#fafcfe}
  pre.mermaid{background:#fff;text-align:center;margin:14px 0;overflow:auto}
  /* low-fi visual wireframes (grayscale phone/card frames) — derive-only, no brand colors inside */
  .wireframes{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,max-content));gap:24px;align-items:start;background:#ececf0;padding:18px;border-radius:8px}
  .screen{width:260px;background:#fff;border:1px solid #c9c9cf;border-radius:22px;box-shadow:0 1px 4px rgba(0,0,0,.08);padding:14px;position:relative;filter:grayscale(100%)}
  .screen.web{width:340px;border-radius:8px}
  .wf-num{position:absolute;top:-10px;left:-10px;width:24px;height:24px;border-radius:50%;background:#555;color:#fff;font-size:13px;display:flex;align-items:center;justify-content:center}
  .wf-header{display:flex;align-items:center;gap:8px;border-bottom:1px solid #e4e4ea;padding-bottom:8px;margin-bottom:10px;font-weight:600}
  .wf-back{color:#888}.wf-title{flex:1}
  .wf-content{min-height:210px}
  .wf-field label{display:block;font-size:12px;color:#555;margin:6px 0 3px}
  .wf-input{height:30px;border:1px solid #cfcfd6;border-radius:6px;background:#fafafb}
  .wf-bar{height:9px;background:#dcdce2;border-radius:5px;margin:6px 0}
  .wf-masked{letter-spacing:3px;color:#888}
  .wf-info{display:flex;justify-content:space-between;font-size:13px;margin:6px 0;color:#555}
  .wf-primary{margin-top:14px;height:38px;background:#666;color:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:600}
  .wf-secondary{text-align:center;color:#777;margin-top:8px;font-size:13px}
  .wf-error{margin:10px 0;border:1px solid #b9b9c0;border-left:3px solid #888;background:#f4f4f6;padding:8px;font-size:13px}
  .wf-assume{font-size:11px;background:#eee;color:#666;border:1px dashed #aaa;border-radius:9px;padding:0 6px}
  .wf-src{margin-top:12px;padding-top:8px;border-top:1px dashed #d5d5db;font-size:11px;color:#888}
  .casegroup-title{width:100%;margin:18px 0 0;color:#555}
</style>
</head>
<body>
<div class="page">
  <!-- CLARIFY:BODY — full URD rendered from clarify-output/urd.md (pandoc md->html --toc, or fallback).
       Keep the source section order: Document control → Lịch sử thay đổi → Mục lục → §1 → §2 →
       Quy ước sơ đồ → §3 (repeating) → §4 → §5 → Sign-off. Mermaid blocks stay as
       <pre class="mermaid">…</pre> so they render client-side. No tool label in displayed content. -->
</div>
</body>
</html>
